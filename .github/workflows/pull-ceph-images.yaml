name: Pull Ceph Docker Images

on:
  workflow_dispatch:
    inputs:
      ceph_version:
        description: 'Ceph 版本 (例如: quincy, reef, squid)'
        required: true
        default: 'v20.2.1-20260402'
      artifact_name:
        description: '制品包名称'
        required: true
        default: 'test'

jobs:
  pull-ceph:
    runs-on: ubuntu-22.04
    steps:
    - name: Clean up Docker
      run: |
        docker system prune -a -f --volumes

    - name: Pull and Package Ceph Images
      id: pull_images
      run: |
        VERSION="${{ github.event.inputs.ceph_version }}"
        ARTIFACT_NAME="${{ github.event.inputs.artifact_name }}"
        
        # Ceph 常用的镜像列表 (根据版本不同，镜像名可能略有差异，以官方为准)
        # 注意：Ceph 镜像通常托管在 quay.io 或 docker.io
        IMAGES=(
          "quay.io/ceph/ceph:${VERSION}"
          "quay.io/ceph/grafana:9.5.9"
          "quay.io/prometheus/prometheus:latest"
          "quay.io/prometheus/alertmanager:latest"
          "quay.io/prometheus/node-exporter:latest"
        )

        mkdir -p ceph-images
        cd ceph-images
        
        for image in "${IMAGES[@]}"; do
          echo "Pulling: $image"
          docker pull "$image" --platform linux/amd64 || echo "Failed to pull $image"
          
          # 生成文件名
          img_name=$(echo "$image" | sed 's|/|_|g; s|:|_|g')
          tar_file="${img_name}.tar"
          xz_file="${img_name}.tar.xz"
          
          docker save "$image" -o "$tar_file"
          xz -v -T0 -8 "$tar_file"
          echo "Saved: $xz_file"
        done
        
        cd ..
        # 打包成 zip
        tar -cJf "${ARTIFACT_NAME}.tar.xz" ceph-images/
        
        # 清理
        rm -rf ceph-images
        docker system prune -a -f --volumes

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: ${{ github.event.inputs.artifact_name }}.tar.xz
        retention-days: 14
